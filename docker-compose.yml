version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: crm_db
    restart: always
    environment:
      POSTGRES_USER:     crmuser
      POSTGRES_PASSWORD: crmpassword
      POSTGRES_DB:       crmdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmuser -d crmdb"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    build: .
    container_name: crm_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      PGUSER:     crmuser
      PGHOST:     db
      PGDATABASE: crmdb
      PGPASSWORD: crmpassword
      PGPORT:     5432
      PORT:       3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
